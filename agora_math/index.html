<script>
// ══════════════════════════════════════════
// TOPIC DATA
// 구조: { id, day, title, desc, cards: { h, a, m } }
//   각 카드: { tag, body, ans }
// ══════════════════════════════════════════

const TOPICS = [
  {
    id: 'day01',
    day: 1,
    week: 1,
    title: '정수와 유리수의 엄밀한 정의',
    titleEn: 'Integers & Rational Numbers',
    desc: '수직선은 유리수로 완전히 채워지는가 — 수의 체계를 논리적으로 세우다',
    cards: {
      h: {
        tag: '🏛️ 하크니스 원탁',
        body: `<div class="question">우리는 왜 0보다 작은 수가 필요했을까? 그리고 0.333…과 1/3은 정확히 같은 것일까?</div>

<h3>📜 오늘의 규칙</h3>
<ul>
<li>발언 전 앞 사람의 말을 한 문장으로 요약한다</li>
<li>수식보다 이유를 먼저 말한다</li>
<li>반론은 "나는 다르게 생각해"로 시작한다</li>
</ul>

<h3>🌱 오늘의 탐구 문제 (The Opening Task)</h3>
<div class="highlight">학생들에게 바로 정의를 알려주기보다, 다음 질문으로 시작합니다:<br><br>
"우리는 왜 0보다 작은 수가 필요했을까? 그리고 0.333…과 1/3은 정확히 같은 것일까?"</div>

<h3>🔑 핵심 개념 (Core Concepts)</h3>
<ul>
<li><strong>정수 (Integers, ℤ)</strong>: 단순히 '자연수와 그 음수'가 아니라, <strong>방향성(Direction)</strong>과 상대적 크기를 가진 수. 수직선 위에서의 '이동' 개념으로 접근한다.</li>
<li><strong>유리수 (Rational Numbers, ℚ)</strong>: 핵심은 <strong>비(Ratio)</strong>. 두 정수 a, b (단, b≠0)에 대해 a/b 형태로 나타낼 수 있는 모든 수.</li>
<li><strong>밀집성 (Density Property)</strong>: 어떤 서로 다른 두 유리수 사이에는 반드시 또 다른 유리수가 존재한다. (예: 0.1과 0.2 사이의 수는 무수히 많다.)</li>
</ul>

<h3>🗺️ 심화 활동: 수의 지도 그리기</h3>
단순한 분류표를 넘어, 각 수의 집합이 서로 어떻게 포함되는지 벤다이어그램으로 시각화하고, '정수는 유리수인가?'라는 명제에 대해 논리적으로 답변하는 훈련.

<h3>💬 하크니스 토론 질문 (Harkness Discussion)</h3>
<div class="question">만약 세상에 유리수만 있고 무리수(Irrational Numbers)가 없다면, 우리가 측정할 수 없는 길이는 무엇이 있을까?</div>
<div class="highlight">목표: 학생들 스스로 유리수의 한계를 느끼게 하고, 다음에 배울 실수의 개념을 궁금해하도록 유도한다.</div>`,
        ans: `<h3>🏛️ 하크니스 원탁 — 토론 정리</h3>

<h3>🔢 수의 집합 포함 관계</h3>
<div class="highlight">자연수 ⊂ 정수 ⊂ 유리수 ⊂ 실수<br>
"정수는 유리수인가?" → <strong>참</strong>. 정수 n = n/1 이므로 유리수의 형태로 표현 가능.</div>

<h3>밀집성 증명 (간단 버전)</h3>
<ul>
<li>두 유리수 a/b 와 c/d 사이에는 (a/b + c/d) ÷ 2 = (ad+bc) / 2bd 가 항상 존재</li>
<li>이 과정을 무한히 반복 가능 → 유리수는 수직선 위에 빽빽하게 채워져 있다</li>
</ul>

<h3>💡 실생활 연결 (Real-world Connection)</h3>
<ul>
<li><strong>회계와 수의 체계</strong>: 기업 재무제표에서 '부채(Debt)'를 음의 정수로 표현하는 방식</li>
<li><strong>주식 시장</strong>: 소수점 넷째 자리까지 사용하는 유리수의 정밀함</li>
<li>수학이 관념이 아닌 <strong>'약속'</strong>임을 깨닫게 한다</li>
</ul>

<h3>🎯 수업 마무리 퀴즈 (The Exit Ticket)</h3>
<div class="question">"모든 정수는 유리수이지만, 모든 유리수는 정수가 아니다."<br>이 문장이 참인지 거짓인지 이유와 함께 설명하시오.</div>
<div class="highlight">정답: <strong>참</strong><br>
정수 n = n/1 이므로 모든 정수는 유리수다. (전자 성립)<br>
유리수 1/2 = 0.5는 정수가 아니다. (후자 성립)<br>
따라서 두 집합은 포함 관계 (정수 ⊂ 유리수) 이다.</div>

<div class="highlight">🔙 출발점 요약: "비(Ratio)"라는 개념 하나가 정수를 유리수로 확장시킨다. 이 확장의 논리가 수학 전체의 뼈대다.</div>`
      },
      a: {
        tag: '🏛️ 아고라 광장',
        body: `<div class="question">0.333…과 1/3은 완전히 같은 수인가, 아니면 무한히 가까운 다른 수인가?</div>

<h3>🏛️ 아고라 광장이란?</h3>
<div class="highlight">그리스 아테네의 공개 광장. 시민 누구나 발언하고, 두 진영이 대립하며, 진실을 함께 찾아간다. 원탁이 아니라 <strong>광장</strong>이다.</div>

<h3>⚔️ 오늘의 대립</h3>
<ul>
<li><strong>A 진영 — "완전히 같다"</strong>: 수학적 정의상 동일한 값</li>
<li><strong>B 진영 — "다르다"</strong>: 소수점은 끝나지 않으므로 완전한 동일이란 없다</li>
</ul>

<h3>📣 광장의 규칙</h3>
<ul>
<li>발언 시간: 최대 1분</li>
<li>상대 진영 발언 후 즉각 반론 가능</li>
<li>수, 사례, 비유로 근거를 댄다</li>
<li>마지막엔 전체 표결 — 과반이면 이긴다</li>
</ul>

<h3>🌿 대화 씨앗</h3>
<ul>
<li>1/3을 계산기로 누르면 끝없이 이어진다 — 이것이 수인가?</li>
<li>0.999… = 1 인가? 왜 그런가 또는 왜 아닌가?</li>
<li>무한히 이어지는 소수는 "도달할 수 없는 수"인가?</li>
</ul>

<h3>🔑 핵심 개념 연결</h3>
<ul>
<li><strong>유리수</strong>: a/b 형태 → 소수로 표현하면 반드시 유한소수 또는 <strong>순환소수</strong></li>
<li><strong>밀집성</strong>: 두 유리수 사이엔 항상 또 다른 유리수가 있다</li>
<li><strong>무리수</strong>: 순환하지 않는 무한소수 → 유리수가 아니다</li>
</ul>`,
        ans: `<h3>🏛️ 아고라 광장 — 논점 정리</h3>

<h3>A 진영 — "같다"의 근거</h3>
<ul>
<li>수학적 증명: 1/3 × 3 = 1, 0.333… × 3 = 0.999… = 1 → 같음</li>
<li>대수적 증명: x = 0.333…, 10x = 3.333…, 9x = 3, x = 1/3</li>
<li>유리수 정의상 1/3과 0.333…은 동일한 실수를 가리킨다</li>
</ul>

<h3>B 진영 — "다르다"의 한계</h3>
<ul>
<li>직관적으로 "끝나지 않는 수"는 불완전해 보임 — 그러나 이것은 수학적 직관의 함정</li>
<li>무한급수 합 1/3 = Σ(3/10ⁿ) 은 극한값으로 정확히 수렴</li>
<li>B 진영의 직관은 수학적으로는 틀렸지만, 무한에 대한 철학적 질문은 유효하다</li>
</ul>

// ══════════════════════════════════════════
// 앱 상태
// ══════════════════════════════════════════
let currentTopic = null;
let currentFormat = 'h';
let isFlipped = false;

// ── 주차 정보 ──
const WEEKS = {
  1: { label:'1주차', theme:'수의 체계와 논리적 사고', color:'#a78bfa' },
  2: { label:'2주차', theme:'대수학의 기초',           color:'#60a5fa' },
  3: { label:'3주차', theme:'기하학적 탐구',           color:'#34d399' },
  4: { label:'4주차', theme:'심화 대수 및 데이터 분석', color:'#fbbf24' }
};

// ── 홈 렌더링 ──
function renderHome() {
  const list = document.getElementById('day-list');
  let html = '';
  let lastWeek = 0;
  TOPICS.forEach(t => {
    const week = t.week || 1;
    if (week !== lastWeek) {
      const w = WEEKS[week];
      html += `<div style="margin:${lastWeek?'18px':'0'} 0 8px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.04);border-left:3px solid ${w.color}">
        <div style="font-size:.65rem;color:${w.color};font-weight:700;letter-spacing:.5px">${w.label}</div>
        <div style="font-size:.75rem;color:rgba(255,255,255,.6);margin-top:2px">${w.theme}</div>
      </div>`;
      lastWeek = week;
    }
    if (t.locked) {
      html += `<div class="day-card locked">
        <div class="day-num">DAY ${t.day} · ${t.titleEn}</div>
        <div class="day-title">${t.title}</div>
        <div class="day-desc">${t.desc}</div>
        <div style="margin-top:6px;font-size:.62rem;color:rgba(255,255,255,.25)">🔒 준비 중</div>
      </div>`;
    } else {
      html += `<div class="day-card unlocked" onclick="openTopic('${t.id}')">
        <div class="day-num">DAY ${t.day} · ${t.titleEn||''}</div>
        <div class="day-title">${t.title}</div>
        <div class="day-desc">${t.desc}</div>
        <div class="day-formats">
          <span class="fmt-badge fmt-h">🏛️ 하크니스</span>
          <span class="fmt-badge fmt-a">🏛️ 아고라</span>
          <span class="fmt-badge fmt-m">🔬 미네르바</span>
          <span class="fmt-badge fmt-g">🍎 가이드</span>
          <span class="fmt-badge" style="background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)">🚨 순간</span>
        </div>
      </div>`;
    }
  });
  list.innerHTML = html;
}

// ── 주제 열기 ──
function openTopic(id) {
  currentTopic = TOPICS.find(t => t.id === id);
  if (!currentTopic || currentTopic.locked) return;
  document.getElementById('topic-day-label').textContent = `DAY ${currentTopic.day}`;
  document.getElementById('topic-main-title').textContent = currentTopic.title;
  document.getElementById('home').style.display = 'none';
  document.getElementById('topic').style.display = 'block';
  selectFormat('h');
}

// ── 홈으로 ──
function goHome() {
  document.getElementById('topic').style.display = 'none';
  document.getElementById('home').style.display = 'block';
}

// ── 포맷 선택 ──
function selectFormat(fmt) {
  currentFormat = fmt;
  isFlipped = false;

  // 교실 순간 — 플립 없이 별도 렌더
  if (fmt === 'e') {
    ['h','a','m','g','e'].forEach(f => {
      const tab = document.getElementById(`tab-${f}`);
      if (tab) { tab.className = 'fmt-tab'; if (f === 'e') tab.classList.add('active-e'); }
    });
    document.getElementById('card-wrap').className = 'card-wrap';
    document.getElementById('card-inner').classList.remove('flipped');
    document.getElementById('card-front').innerHTML = currentTopic.cards.e || '';
    document.getElementById('card-back').innerHTML = '';
    document.getElementById('flip-area').style.display = 'none';
    return;
  }
  document.getElementById('flip-area').style.display = 'block';

  // 탭 활성화
  ['h','a','m','g','e'].forEach(f => {
    const tab = document.getElementById(`tab-${f}`);
    tab.className = 'fmt-tab';
    if (f === fmt) tab.classList.add(`active-${f}`);
  });

  // 카드 테마
  const wrap = document.getElementById('card-wrap');
  wrap.className = `card-wrap theme-${fmt}`;

  // 카드 내용
  const card = currentTopic.cards[fmt];
  document.getElementById('card-front').innerHTML = `
    <span class="card-tag" style="${tagStyle(fmt)}">${card.tag}</span>
    <div class="card-body">${card.body}</div>
  `;
  document.getElementById('card-back').innerHTML = `
    <div class="card-body">${card.ans}</div>
  `;

  // 플립 리셋
  const inner = document.getElementById('card-inner');
  inner.classList.remove('flipped');
  document.getElementById('flip-btn').textContent = '💡 생각 펼치기';
}

function tagStyle(fmt) {
  const styles = {
    h: 'background:rgba(251,191,36,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.4)',
    a: 'background:rgba(52,211,153,.2);color:#34d399;border:1px solid rgba(52,211,153,.4)',
    m: 'background:rgba(96,165,250,.2);color:#60a5fa;border:1px solid rgba(96,165,250,.4)',
    g: 'background:rgba(251,113,133,.2);color:#fb7185;border:1px solid rgba(251,113,133,.4)',
    e: 'background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.4)'
  };
  return styles[fmt];
}

// ── 카드 플립 ──
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
  document.getElementById('flip-btn').textContent = isFlipped ? '← 문제로 돌아가기' : '💡 생각 펼치기';
}

// ── 초기화 ──
renderHome();
</script>
